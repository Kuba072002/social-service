server.port=8081
spring.application.name=user-svc
server.servlet.context-path=/user-svc/
db.host=localhost
db.port=5432
db.user=postgres
db.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://${db.host}:${db.port}/social_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=user_schema
jwt.access.secret=long_and_secure_jwt_secret_for_development
#15 minutes
jwt.access.expiration=900000
jwt.refresh.secret=long_and_secure_refreshsec_for_development
#14 days
jwt.refresh.expiration=1209600000
logging.level.root=INFO
logging.level.org.zalando.logbook.Logbook=TRACE
monitoring.host=localhost
management.otlp.metrics.export.url=http://${monitoring.host}:4318/v1/metrics
management.opentelemetry.tracing.export.otlp.endpoint=http://${monitoring.host}:4318/v1/traces
management.opentelemetry.logging.export.otlp.endpoint=http://${monitoring.host}:4318/v1/logs
#for development
management.tracing.sampling.probability=1.0